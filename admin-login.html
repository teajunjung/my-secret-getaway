<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 로그인 | MY SECRET GETAWAY</title>
  <meta name="robots" content="noindex, nofollow">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+KR:wght@300;400;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./src/admin.css">
</head>
<body class="login-page">

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-brand">
        <span class="logo-title">MY SECRET GETAWAY</span>
        <span class="logo-sub">ADMIN PORTAL</span>
      </div>

      <h1 class="login-heading">관리자 로그인</h1>
      <p class="login-desc">콘텐츠 관리 및 대시보드에 접속합니다.</p>

      <form id="login-form" class="login-form" novalidate>
        <div class="form-field">
          <label for="admin-email">이메일</label>
          <input type="email" id="admin-email" placeholder="admin@secretgetaway.co" required autocomplete="email">
        </div>
        <div class="form-field">
          <label for="admin-password">비밀번호</label>
          <input type="password" id="admin-password" placeholder="비밀번호를 입력하세요" required autocomplete="current-password">
        </div>

        <div id="login-error" class="login-error" hidden>
          <span>⚠️ </span><span id="login-error-msg"></span>
        </div>

        <button type="submit" id="login-submit-btn" class="btn btn-primary btn-block">
          로그인
        </button>
      </form>

      <div class="login-footer">
        <a href="./index.html" class="back-link">← 메인 사이트로 돌아가기</a>
        <p class="login-hint">테스트 계정: admin@secretgetaway.co / admin1234</p>
      </div>
    </div>
  </div>

  <script type="module">
    import { dataService } from './src/services/dataService.js';

    // Redirect if already logged in
    (async () => {
      if (await dataService.isAuthenticated()) {
        window.location.href = './admin.html';
      }
    })();

    const form = document.getElementById('login-form');
    const errorBox = document.getElementById('login-error');
    const errorMsg = document.getElementById('login-error-msg');
    const submitBtn = document.getElementById('login-submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.hidden = true;
      submitBtn.disabled = true;
      submitBtn.textContent = '로그인 중...';

      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;

      const result = await dataService.login(email, password);

      if (result.success) {
        window.location.href = './admin.html';
      } else {
        errorMsg.textContent = result.error;
        errorBox.hidden = false;
        submitBtn.disabled = false;
        submitBtn.textContent = '로그인';
      }
    });
  </script>
</body>
</html>
